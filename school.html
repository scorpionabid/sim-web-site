<!DOCTYPE html>
<html lang="az">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Construction</title>
    <style>
        body {
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;

            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            text-align: center;
        }
        .container {
            background-color: #ffffff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
        }
        h1 {
            color: red;
            font-size: 48px;
            margin-bottom: 20px;
        }
        p {
            color: #007bff;
            font-size: 24px;
            margin-bottom: 20px;
        }
        .icons {
            font-size: 50px;
        }
        .icons i {
            margin: 0 10px;
        }
        .back-button {
            position: absolute;
            top: 10px;
            left: 10px;
            background-color: red;
            padding: 10px;
            border-radius: 5px;
            color: white;
        }

    <!-- İkonlar üçün Font Awesome linki -->
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>

<body>
    <a href="index.html" class="back-button"><i class="fas fa-arrow-left"></i> Geri dön</a>

        <h1>Under Construction</h1>
        <p>Burda sizin üçün möhtəşəm işlər görülür</p>
        <div class="icons">
            <i class="fas fa-hard-hat"></i>
            <i class="fas fa-tools"></i>
            <i class="fas fa-truck"></i>
        </div>
    </div>
